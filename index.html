<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyscanner Creator Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #00B4D8;
    --sky-dark: #0077B6;
    --sky-light: #E0F7FA;
    --sky-mid: #B3EAF5;
    --text: #0D1B2A;
    --muted: #5C6B7A;
    --border: #D8E3EC;
    --surface: #F4F8FB;
    --white: #ffffff;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 1rem 4rem;
  }

  header {
    width: 100%;
    max-width: 640px;
    padding: 3rem 0 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--sky);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 22px; height: 22px; fill: white; }
  .logo-name { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .tagline { font-size: 14px; color: var(--muted); text-align: center; }

  .search-box { width: 100%; max-width: 640px; display: flex; gap: 8px; }
  .search-box input {
    flex: 1; font-family: 'Inter', sans-serif; font-size: 15px;
    padding: 12px 16px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); background: var(--white);
    color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: var(--sky); }
  .search-box input::placeholder { color: #9BADB8; }
  .search-box button {
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
    padding: 12px 20px; background: var(--sky); color: white;
    border: none; border-radius: var(--radius-sm); cursor: pointer;
    transition: background 0.15s, transform 0.1s; white-space: nowrap;
  }
  .search-box button:hover { background: var(--sky-dark); }
  .search-box button:active { transform: scale(0.97); }

  .status {
    width: 100%; max-width: 640px; font-size: 13px;
    color: var(--muted); margin-top: 1rem; min-height: 20px; text-align: center;
  }

  .result { width: 100%; max-width: 640px; margin-top: 1.25rem; }

  .card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .creator-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.25rem; }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--sky-light); color: var(--sky-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600; flex-shrink: 0;
  }
  .creator-name { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .creator-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px;
  }

  .location-cards { display: flex; flex-direction: column; gap: 12px; }

  .loc-card {
    border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden;
  }

  .loc-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; cursor: pointer; background: var(--surface);
    transition: background 0.15s; gap: 10px;
  }
  .loc-header:hover { background: var(--sky-light); }

  .loc-header-left { display: flex; align-items: center; gap: 10px; }

  .loc-pin {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--sky-mid); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .loc-pin svg {
    width: 14px; height: 14px; fill: var(--sky-dark);
  }

  .loc-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .loc-count { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .loc-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .folder-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px; background: var(--white);
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 12px; font-weight: 500; color: var(--sky-dark);
    text-decoration: none; transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .folder-btn:hover { background: var(--sky-light); border-color: var(--sky); }
  .folder-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .chevron { width: 16px; height: 16px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform 0.2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }

  .loc-body { display: none; border-top: 1px solid var(--border); }
  .loc-body.open { display: block; }

  .shot-list { list-style: none; }
  .shot-item {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
  }
  .shot-item:last-child { border-bottom: none; }

  .shot-number { font-size: 11px; font-weight: 600; color: var(--sky); letter-spacing: 0.05em; margin-bottom: 3px; }
  .shot-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .shot-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 6px; }
  .shot-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .shot-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500;
  }
  .badge-type { background: #EEF2FF; color: #4338CA; }
  .badge-time { background: #FFF7ED; color: #C2410C; }

  .empty { text-align: center; padding: 2.5rem 1rem; }
  .empty-icon { width: 48px; height: 48px; stroke: var(--border); fill: none; stroke-width: 1.5; margin: 0 auto 1rem; display: block; }
  .empty h3 { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 13px; color: var(--muted); }

  .multi-list { display: flex; flex-direction: column; gap: 8px; }
  .multi-label { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .mini-card {
    padding: 12px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .mini-card:hover { border-color: var(--sky); background: var(--sky-light); }
  .mini-card-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .mini-card-locs { font-size: 12px; color: var(--muted); margin-top: 2px; }

  footer { margin-top: 3rem; font-size: 12px; color: #9BADB8; text-align: center; }

  @media (max-width: 600px) {
    header { padding: 2rem 0 1.5rem; }
    .search-box { flex-direction: column; }
    .search-box button { width: 100%; }
    .loc-actions { flex-direction: column; align-items: flex-end; gap: 4px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
      </svg>
    </div>
    <span class="logo-name">Skyscanner Creator Portal</span>
  </div>
  <p class="tagline">Enter your name to see your assigned locations and shoot guide.</p>
</header>

<div class="search-box">
  <input type="text" id="nameInput" placeholder="Your name..." onkeydown="if(event.key==='Enter') search()" />
  <button onclick="search()">Look up</button>
</div>

<div class="status" id="status"></div>
<div class="result" id="result"></div>

<footer>Skyscanner × Creator Campaign &nbsp;·&nbsp; Internal use only</footer>

<script>
const BASE_ID = "apptIwCycf2glxHmY";
const TOKEN = "patXiPNLUcL7fSfwT.d80e8f893f5acf573ea40629ee99f34c8a6a447d627f4b68d09d1b6b8349287e";

function initials(name) {
  return name.trim().split(/\s+/).map(p => p[0]).join('').slice(0, 2).toUpperCase();
}

function parseShots(aiText) {
  if (!aiText) return [];
  const shots = [];
  const blocks = aiText.split(/(?=\n?#\d+\.)/).filter(b => b.trim());
  for (const block of blocks) {
    const titleMatch = block.match(/#\d+\.\s*(.+)/);
    if (!titleMatch) continue;
    const title = titleMatch[1].trim();
    const descMatch = block.match(/•\s*Description:\s*(.+?)(?=\n•|\n#|$)/s);
    const typeMatch = block.match(/•\s*Shot Type:\s*(.+?)(?=\n|$)/);
    const timeMatch = block.match(/•\s*Best Time:\s*(.+?)(?=\n|$)/);
    shots.push({
      title,
      desc: descMatch ? descMatch[1].replace(/\n/g, ' ').trim() : '',
      type: typeMatch ? typeMatch[1].trim() : '',
      time: timeMatch ? timeMatch[1].trim() : ''
    });
  }
  return shots;
}

function folderSvg() {
  return `<svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>`;
}

function externalSvg() {
  return `<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>`;
}

function renderLocCard(loc, idx) {
  const shots = parseShots(loc.aiAssist);
  const countText = shots.length ? `${shots.length} shoot spots` : 'No shoot guide yet';

  const shotsHtml = shots.length ? shots.map((s, i) => `
    <li class="shot-item">
      <div class="shot-number">SPOT ${i + 1}</div>
      <div class="shot-title">${s.title}</div>
      ${s.desc ? `<div class="shot-desc">${s.desc}</div>` : ''}
      <div class="shot-meta">
        ${s.type ? `<span class="shot-badge badge-type">${s.type}</span>` : ''}
        ${s.time ? `<span class="shot-badge badge-time">${s.time}</span>` : ''}
      </div>
    </li>`).join('') : `<li class="shot-item"><p style="font-size:13px;color:var(--muted)">Shoot guide coming soon.</p></li>`;

  const folderBtn = loc.folder
    ? `<a class="folder-btn" href="${loc.folder}" target="_blank" rel="noopener">${folderSvg()} Folder ${externalSvg()}</a>`
    : '';

  return `
    <div class="loc-card">
      <div class="loc-header" onclick="toggleLoc(${idx})">
        <div class="loc-header-left">
          <div class="loc-pin">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </div>
          <div>
            <div class="loc-name">${loc.name}</div>
            <div class="loc-count">${countText}</div>
          </div>
        </div>
        <div class="loc-actions">
          ${folderBtn}
          <svg class="chevron" id="chev-${idx}" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="loc-body" id="locbody-${idx}">
        <ul class="shot-list">${shotsHtml}</ul>
      </div>
    </div>`;
}

function toggleLoc(idx) {
  const body = document.getElementById('locbody-' + idx);
  const chev = document.getElementById('chev-' + idx);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function renderCard(rec) {
  const name = rec.name || 'Unknown';
  const locs = rec.locations || [];

  const locCardsHtml = locs.length
    ? locs.map((l, i) => renderLocCard(l, i)).join('')
    : `<p style="font-size:13px;color:var(--muted)">No locations assigned yet.</p>`;

  document.getElementById('result').innerHTML = `
    <div class="card">
      <div class="creator-header">
        <div class="avatar">${initials(name)}</div>
        <div>
          <div class="creator-name">${name}</div>
          <div class="creator-sub">Skyscanner Campaign · ${locs.length} location${locs.length !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <hr class="divider">
      <p class="section-label">Assigned locations — tap to expand shoot guide</p>
      <div class="location-cards">${locCardsHtml}</div>
    </div>`;
}

function renderMultiple(records) {
  window._multiRecords = records;
  const items = records.map((r, i) => {
    const preview = r.locations.map(l => l.name).slice(0, 3).join(', ') + (r.locations.length > 3 ? ` +${r.locations.length - 3} more` : '');
    return `<div class="mini-card" onclick="selectRecord(${i})">
      <div class="mini-card-name">${r.name}</div>
      <div class="mini-card-locs">${preview || 'No locations assigned'}</div>
    </div>`;
  }).join('');
  document.getElementById('result').innerHTML = `
    <div class="card">
      <p class="multi-label">Multiple matches found — select your name:</p>
      <div class="multi-list">${items}</div>
    </div>`;
}

function selectRecord(i) { renderCard(window._multiRecords[i]); }
function setStatus(msg) { document.getElementById('status').textContent = msg; }

async function resolveLocations(ids) {
  if (!ids || ids.length === 0) return [];
  const filter = encodeURIComponent(`OR(${ids.map(id => `RECORD_ID()="${id}"`).join(',')})`);
  const url = `https://api.airtable.com/v0/${BASE_ID}/Locations?filterByFormula=${filter}&fields%5B%5D=Location&fields%5B%5D=AI+assist&fields%5B%5D=Folder`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
  if (!res.ok) return ids.map(id => ({ name: id, aiAssist: '', folder: null }));
  const data = await res.json();
  const map = {};
  (data.records || []).forEach(r => {
    map[r.id] = {
      name: r.fields['Location'] || r.id,
      aiAssist: r.fields['AI assist'] || '',
      folder: r.fields['Folder'] || null
    };
  });
  return ids.map(id => map[id] || { name: id, aiAssist: '', folder: null });
}

async function search() {
  const query = document.getElementById('nameInput').value.trim();
  if (!query) return;

  setStatus('Searching...');
  document.getElementById('result').innerHTML = '';

  try {
    const filter = encodeURIComponent(`SEARCH(LOWER("${query.replace(/"/g, '')}"), LOWER({Name}))`);
    const url = `https://api.airtable.com/v0/${BASE_ID}/Creators?filterByFormula=${filter}&fields%5B%5D=Name&fields%5B%5D=Locations&fields%5B%5D=Submission+Folder`;

    const res = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
    if (!res.ok) { setStatus('Could not reach the database. Please try again.'); return; }

    const data = await res.json();

    if (!data.records || data.records.length === 0) {
      setStatus('');
      document.getElementById('result').innerHTML = `
        <div class="card">
          <div class="empty">
            <svg class="empty-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v3M11 14h.01"/></svg>
            <h3>No creator found for "${query}"</h3>
            <p>Double-check the spelling of your name and try again.</p>
          </div>
        </div>`;
      return;
    }

    setStatus('Loading shoot guides...');

    const allIds = [...new Set(data.records.flatMap(r => Array.isArray(r.fields['Locations']) ? r.fields['Locations'] : []))];
    const locData = await resolveLocations(allIds);
    const idMap = {};
    allIds.forEach((id, i) => { idMap[id] = locData[i]; });

    setStatus('');

    const records = data.records.map(r => ({
      name: r.fields['Name'] || '',
      locations: (Array.isArray(r.fields['Locations']) ? r.fields['Locations'] : []).map(id => idMap[id] || { name: id, aiAssist: '', folder: null })
    }));

    if (records.length === 1) {
      renderCard(records[0]);
    } else {
      renderMultiple(records);
    }

  } catch (err) {
    setStatus('Connection error. Please check your internet and try again.');
    console.error(err);
  }
}
</script>
</body>
</html>
